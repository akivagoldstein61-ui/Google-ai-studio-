name: "Personality Feature Request"
description: "Propose a new feature or change to Kesher's Personality Dimension"
title: "[Personality] "
labels: ["personality", "needs-review"]
body:
  - type: markdown
    attributes:
      value: |
        ## Personality Feature Request

        All personality-related features must satisfy Kesher's safety, privacy, and psychometric contracts.
        Read `docs/personality/release-gates.md` before submitting.

  - type: textarea
    id: summary
    attributes:
      label: "Feature Summary"
      description: "Describe the feature in 1–3 sentences."
    validations:
      required: true

  - type: textarea
    id: user-value
    attributes:
      label: "User Value"
      description: "What is the user benefit? How does it serve connection, not scoring?"
    validations:
      required: true

  - type: checkboxes
    id: forbidden-patterns
    attributes:
      label: "Forbidden Patterns Check"
      description: "Confirm none of the following apply. See `docs/personality/forbidden-patterns.md`."
      options:
        - label: "No compatibility score"
          required: true
        - label: "No soulmate score"
          required: true
        - label: "No marriage probability"
          required: true
        - label: "No desirability score"
          required: true
        - label: "No public trait rank"
          required: true
        - label: "No raw trait public exposure"
          required: true
        - label: "No hidden personality ranking"
          required: true
        - label: "No diagnosis or clinical inference"
          required: true
        - label: "No protected-trait inference from photos, writing style, names, location, or other proxies"
          required: true
        - label: "No AI auto-send"
          required: true
        - label: "No AI impersonation"
          required: true
        - label: "No public attractiveness scoring"
          required: true
        - label: "No hidden throttling or ranking manipulation"
          required: true
        - label: "No raw inferred personality dossier sharing"
          required: true
        - label: "No coercive mutual unlock"
          required: true
        - label: "Privacy, deletion, reset, revoke, export, safety, and consent controls are never paywalled"
          required: true

  - type: textarea
    id: privacy-impact
    attributes:
      label: "Privacy Impact"
      description: |
        Does this feature collect, infer, store, or expose personality data?
        Describe what data is involved and whether it is private by default.
    validations:
      required: true

  - type: dropdown
    id: data-classification
    attributes:
      label: "Data Classification"
      description: "Classify the most sensitive data this feature touches. See `docs/personality/data-classification.md`."
      options:
        - "P0 – Critical (inferred traits, raw scores)"
        - "P1 – Sensitive (user-authored reflections, assessments)"
        - "P2 – Internal (aggregated anonymized signals)"
        - "P3 – Non-sensitive (UI preferences)"
    validations:
      required: true

  - type: textarea
    id: psychometric-notes
    attributes:
      label: "Psychometric / Research Notes"
      description: |
        Does this feature involve a measurement instrument, scoring algorithm, or scientific claim?
        If so, describe the instrument, cite sources, and confirm it is licensed/open.
        See `docs/personality/claim-registry.md`.

  - type: checkboxes
    id: claim-labels
    attributes:
      label: "Claim Evidence Labels"
      description: "All user-facing claims must carry one of these labels."
      options:
        - label: "VERIFIED – based on validated, peer-reviewed instrument"
        - label: "INFERRED – derived from behavioral signals with uncertainty disclosure"
        - label: "HEURISTIC – rule-based, no validation study"
        - label: "UNKNOWN – not yet classified"

  - type: checkboxes
    id: rtl-hebrew
    attributes:
      label: "Hebrew / RTL Readiness"
      description: "Hebrew-first and RTL layout are release gates."
      options:
        - label: "All new strings have Hebrew translations or are blocked pending localization review"
          required: true
        - label: "RTL layout is tested or has a tracking issue"
          required: true

  - type: checkboxes
    id: reviewers
    attributes:
      label: "Required Reviewers"
      description: "Tag the appropriate teams before merging."
      options:
        - label: "@privacy-reviewers have been notified"
          required: true
        - label: "@psychometric-reviewers have been notified (if measurement or scoring is involved)"
        - label: "@safety-reviewers have been notified"
        - label: "@l10n-reviewers have been notified for new strings"

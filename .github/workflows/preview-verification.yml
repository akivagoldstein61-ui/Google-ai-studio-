name: Preview Verification

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  deployments: read
  statuses: read

jobs:
  verify-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Discover Vercel preview URL
        id: discover
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.payload.pull_request.head.sha;

            let previewUrl = '';
            const deployments = await github.rest.repos.listDeployments({
              owner,
              repo,
              sha,
              per_page: 30,
            });

            for (const deployment of deployments.data) {
              const statuses = await github.rest.repos.listDeploymentStatuses({
                owner,
                repo,
                deployment_id: deployment.id,
                per_page: 20,
              });

              const candidate = statuses.data.find((status) => {
                const envName = `${status.environment || ''}`.toLowerCase();
                const target = `${status.target_url || status.environment_url || ''}`;
                return envName.includes('preview') && target.includes('vercel.app');
              });

              if (candidate) {
                previewUrl = candidate.target_url || candidate.environment_url || '';
                break;
              }
            }

            if (!previewUrl) {
              core.warning('Vercel preview URL was not discoverable from deployment/status metadata. Verify GitHub ↔ Vercel integration.');
            }

            core.setOutput('preview_url', previewUrl);

      - name: Verify preview availability
        if: steps.discover.outputs.preview_url != ''
        run: node scripts/smoke-deployment.mjs
        env:
          SMOKE_BASE_URL: ${{ steps.discover.outputs.preview_url }}
          EXPECTED_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Verify preview API routing
        if: steps.discover.outputs.preview_url != ''
        run: node scripts/api-smoke.mjs "${{ steps.discover.outputs.preview_url }}"
        env:
          EXPECTED_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Warn if preview URL missing
        if: steps.discover.outputs.preview_url == ''
        run: |
          echo "::warning::Preview URL discovery skipped; run smoke manually once deployment metadata is available."
          echo "::notice::If Vercel Git integration did not create a preview, run the Deploy to Vercel workflow with target=preview after configuring VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID."

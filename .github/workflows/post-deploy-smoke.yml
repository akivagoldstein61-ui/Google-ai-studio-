name: Post-Deploy Smoke Test

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      url:
        description: "Production URL to smoke-test"
        required: false
        default: "https://google-ai-studio-sage-sigma.vercel.app"

permissions:
  contents: read
  deployments: read

jobs:
  smoke:
    name: "Smoke — Production health + auth gates"
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.deployment_status.state == 'success' &&
       github.event.deployment.environment == 'Production')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Determine URL
        id: target
        run: |
          if [ -n "${{ github.event.inputs.url }}" ]; then
            echo "url=${{ github.event.inputs.url }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.deployment_status.target_url }}" ]; then
            echo "url=${{ github.event.deployment_status.target_url }}" >> $GITHUB_OUTPUT
          else
            echo "url=https://google-ai-studio-sage-sigma.vercel.app" >> $GITHUB_OUTPUT
          fi
      - name: Run production smoke test
        env:
          KESHER_PROD_URL: ${{ steps.target.outputs.url }}
        run: node scripts/smoke-production.mjs

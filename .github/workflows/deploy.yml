name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        type: choice
        default: production
        options:
          - production
          - preview

permissions:
  contents: read

env:
  KESHER_PRODUCTION_URL: https://google-ai-studio-sage-sigma.vercel.app
  VERCEL_BUILD_TIME: ${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}

jobs:
  deploy-production:
    name: Deploy (Production)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || inputs.target == 'production'
    environment:
      name: production
      url: ${{ env.KESHER_PRODUCTION_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check Vercel deployment secrets
        id: vercel_secrets
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [[ -n "$VERCEL_TOKEN" && -n "$VERCEL_ORG_ID" && -n "$VERCEL_PROJECT_ID" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Vercel deploy secrets are not configured for this workflow. Vercel Git integration may still deploy the production app."
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Vercel CLI
        if: steps.vercel_secrets.outputs.available == 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        if: steps.vercel_secrets.outputs.available == 'true'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Vercel upload simulation
        if: steps.vercel_secrets.outputs.available == 'true'
        run: npm run check:vercel-upload

      - name: Build for Vercel
        if: steps.vercel_secrets.outputs.available == 'true'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_COMMIT_SHA: ${{ github.sha }}
          VITE_BUILD_TIME: ${{ env.VERCEL_BUILD_TIME }}
          VITE_GIT_BRANCH: ${{ github.ref_name }}
          VITE_DEPLOY_ENV: production

      - name: Vercel output client secret scan
        if: steps.vercel_secrets.outputs.available == 'true'
        shell: bash
        run: |
          set -euo pipefail
          PATTERNS=(
            'DATABASE_URL'
            'DIRECT_DATABASE_URL'
            'GEMINI_API_KEY'
            'FIREBASE_PRIVATE_KEY'
            'FIREBASE_CLIENT_EMAIL'
            'PRIVATE KEY'
            'SERVICE_ACCOUNT'
            'postgres://[^[:space:]]+'
            'postgresql://[^[:space:]]+'
            'NEON_API_KEY'
            'VERCEL_TOKEN'
            'NETLIFY_AUTH_TOKEN'
            '@google/genai'
            'GoogleGenAI'
          )

          found=0
          for pattern in "${PATTERNS[@]}"; do
            if grep -ql -R --binary-files=without-match --include='*.html' --include='*.js' --include='*.css' -E "$pattern" .vercel/output/static; then
              echo "::error::Forbidden pattern found in Vercel static output: $pattern"
              found=1
            fi
          done

          if [ "$found" -ne 0 ]; then
            exit 1
          fi

      - name: Deploy to Vercel (production)
        if: steps.vercel_secrets.outputs.available == 'true'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_COMMIT_SHA: ${{ github.sha }}
          VITE_BUILD_TIME: ${{ env.VERCEL_BUILD_TIME }}
          VITE_GIT_BRANCH: ${{ github.ref_name }}
          VITE_DEPLOY_ENV: production

      - name: API smoke check (production)
        if: steps.vercel_secrets.outputs.available == 'true'
        # Confirms /api/* routes are actually mounted on Vercel rather than
        # falling through to the SPA's index.html (which would return HTML
        # with status 200 — a silent regression). See scripts/api-smoke.mjs.
        run: node scripts/api-smoke.mjs "${{ env.KESHER_PRODUCTION_URL }}"
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Explain skipped Vercel deployment
        if: steps.vercel_secrets.outputs.available != 'true'
        run: |
          echo "::notice::Vercel CLI deployment skipped because VERCEL_TOKEN, VERCEL_ORG_ID, or VERCEL_PROJECT_ID is missing. Configure those repository secrets, then rerun this workflow manually."

  deploy-preview:
    name: Deploy (Manual Preview)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'preview'
    environment:
      name: preview

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check Vercel deployment secrets
        id: vercel_secrets
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [[ -n "$VERCEL_TOKEN" && -n "$VERCEL_ORG_ID" && -n "$VERCEL_PROJECT_ID" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Manual preview deployment requires VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID repository secrets."
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Vercel upload simulation
        run: npm run check:vercel-upload

      - name: Build for Vercel
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_COMMIT_SHA: ${{ github.sha }}
          VITE_BUILD_TIME: ${{ env.VERCEL_BUILD_TIME }}
          VITE_GIT_BRANCH: ${{ github.ref_name }}
          VITE_DEPLOY_ENV: preview

      - name: Vercel output client secret scan
        shell: bash
        run: |
          set -euo pipefail
          PATTERNS=(
            'DATABASE_URL'
            'DIRECT_DATABASE_URL'
            'GEMINI_API_KEY'
            'FIREBASE_PRIVATE_KEY'
            'FIREBASE_CLIENT_EMAIL'
            'PRIVATE KEY'
            'SERVICE_ACCOUNT'
            'postgres://[^[:space:]]+'
            'postgresql://[^[:space:]]+'
            'NEON_API_KEY'
            'VERCEL_TOKEN'
            'NETLIFY_AUTH_TOKEN'
            '@google/genai'
            'GoogleGenAI'
          )

          found=0
          for pattern in "${PATTERNS[@]}"; do
            if grep -ql -R --binary-files=without-match --include='*.html' --include='*.js' --include='*.css' -E "$pattern" .vercel/output/static; then
              echo "::error::Forbidden pattern found in Vercel static output: $pattern"
              found=1
            fi
          done

          if [ "$found" -ne 0 ]; then
            exit 1
          fi

      - name: Deploy to Vercel (manual preview)
        id: deploy_preview
        shell: bash
        run: |
          set -euo pipefail
          vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} | tee /tmp/vercel-preview-url.txt
          url="$(grep -Eo 'https://[^[:space:]]+\.vercel\.app' /tmp/vercel-preview-url.txt | tail -n 1)"
          if [ -z "$url" ]; then
            echo "::error::Unable to determine Vercel preview URL from CLI output."
            exit 1
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Preview deployed: $url"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_COMMIT_SHA: ${{ github.sha }}
          VITE_BUILD_TIME: ${{ env.VERCEL_BUILD_TIME }}
          VITE_GIT_BRANCH: ${{ github.ref_name }}
          VITE_DEPLOY_ENV: preview

      - name: Smoke check (manual preview)
        run: node scripts/smoke-deployment.mjs
        env:
          SMOKE_BASE_URL: ${{ steps.deploy_preview.outputs.url }}
          EXPECTED_COMMIT_SHA: ${{ github.sha }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
